app:
  name: vision-event-platform
  environment: local

database:
  url: postgresql://vision@postgres:5432/vision_events

yolo:
  model_path: models/yolo.pt
  confidence_threshold: 0.5
  device: cpu

tracker:
  type: bytetrack
  max_age: 30
  min_hits: 3

event:
  danger_zone_threshold: 0.8
  cooldown_seconds: 60
  danger_zone: [[100, 100], [500, 100], [500, 500], [100, 500]]
  threshold_sec: 3
  notify_interval_sec: 60

alert_policy:
  default_cooldown_sec: 10
  rules:
    danger_zone:
      cooldown_sec: 10
    loitering:
      cooldown_sec: 30
    person_count:
      cooldown_sec: 15

rules:
  - type: danger_zone
    enabled: true
    config:
      danger_zone: [[100, 100], [500, 100], [500, 500], [100, 500]]
      threshold_sec: 3
      notify_interval_sec: 60
  - type: loitering
    enabled: true
    config:
      roi: [[120, 120], [480, 120], [480, 480], [120, 480]]
      threshold_sec: 10
      notify_interval_sec: 60
  - type: person_count
    enabled: true
    config:
      threshold: 5
      notify_interval_sec: 30
