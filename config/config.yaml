app:
  name: vision-event-platform
  environment: local

database:
  url: postgresql://vision@postgres:5432/vision_events

yolo:
  model_path: models/yolo.pt
  confidence_threshold: 0.5
  device: cpu

tracker:
  type: bytetrack
  max_age: 30
  min_hits: 3

event:
  danger_zone_threshold: 0.8
  cooldown_seconds: 60
