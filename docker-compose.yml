services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vision:vision@postgres:5432/vision_events
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vision_events
      POSTGRES_USER: vision
      POSTGRES_PASSWORD: vision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision -d vision_events"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
